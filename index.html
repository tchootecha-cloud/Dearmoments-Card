<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube & Shorts QR Code Generator</title>
    <!-- เรียกใช้คลังสร้าง QR Code ที่เสถียรและฟรีตลอดชีพ -->
    <script src="https://cloudflare.com"></script>
    <style>
        /* สไตล์หน้าจอพื้นหลัง */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        /* กล่องตัวสร้าง QR Code */
        .generator-container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }
        input[type="text"] {
            width: 100%;
            padding: 12px;
            margin: 15px 0;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 14px;
        }
        button {
            background-color: #ff0000;
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
        }
        button:hover { background-color: #cc0000; }
        
        /* ส่วนแสดงผล QR Code */
        #qrcode {
            margin-top: 20px;
            display: flex;
            justify-content: center;
            flex-direction: column;
            align-items: center;
        }
        #qrcode img {
            margin-top: 10px;
            border: 1px solid #eee;
            padding: 10px;
            background: #fff;
        }

        /* หน้าจอเครื่องเล่นบนมือถือเมื่อสแกน */
        .player-container {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: #000;
            z-index: 9999;
        }
        .video-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        
        /* หน้ากากกรอบสีขาวทับส่วนอินเตอร์เฟส YouTube */
        .white-mask {
            position: absolute;
            background-color: #ffffff;
            z-index: 10;
            pointer-events: none; /* ยอมให้ทัชสกรีนทะลุผ่านไปกดเล่นคลิปได้ */
        }
        /* กรอบบน: บังชื่อคลิป ชื่อช่อง และปุ่มแชร์ */
        .mask-top {
            top: 0; left: 0; width: 100%; height: 70px;
        }
        /* กรอบล่าง: บังโลโก้ YouTube และแถบควบคุมบางส่วน */
        .mask-bottom {
            bottom: 0; left: 0; width: 100%; height: 60px;
        }
    </style>
</head>
<body>

    <!-- ส่วนที่ 1: หน้าจอสร้าง QR CODE -->
    <div id="generatorView" class="generator-container">
        <h2>ระบบสร้าง QR Code วิดีโอ</h2>
        <p style="color: #666; font-size: 14px;">รองรับทั้งลิงก์คลิปยาวปกติ และคลิปสั้น Shorts</p>
        <input type="text" id="youtubeLink" placeholder="วางลิงก์ YouTube หรือ Shorts ที่นี่...">
        <button onclick="generateQR()">สร้าง QR Code</button>
        <div id="qrcode"></div>
    </div>

    <!-- ส่วนที่ 2: หน้าจอเครื่องเล่นบนมือถือเมื่อมีการสแกนเข้ามา -->
    <div id="playerView" class="player-container">
        <div class="video-wrapper">
            <!-- แถบสีขาวด้านบน -->
            <div class="white-mask mask-top"></div>
            
            <!-- ตัวเล่นวิดีโอ -->
            <iframe id="ytPlayer" allow="autoplay; encrypted-media" allowfullscreen></iframe>
            
            <!-- แถบสีขาวด้านล่าง -->
            <div class="white-mask mask-bottom"></div>
        </div>
    </div>

    <script>
        // ฟังก์ชันแกะรหัสวิดีโอตัวใหม่ (Regex) เสถียรและแม่นยำที่สุด รองรับทุกลิงก์บนโลก
        function extractYoutubeId(url) {
            // แพทเทิร์นตรวจสอบลิงก์สากล รองรับ watch?v=, shorts/, youtu.be/ และ embed/
            const regExp = /^.*(?:(?:youtu.be\/|v\/|vi\/|u\/\w\/|embed\/|shorts\/)|(?:(?:watch)?\?v(?:i)?=|\&v(?:i)?=))([^#\&\?]*).*/;
            const match = url.match(regExp);
            return (match && match[1].length === 11) ? match[1] : null;
        }

        // ฟังก์ชันสร้าง QR Code เมื่อกดปุ่ม
        function generateQR() {
            const urlInput = document.getElementById('youtubeLink').value.trim();
            const videoId = extractYoutubeId(urlInput);
            const qrElement = document.getElementById('qrcode');
            
            // ล้างภาพเก่าออกก่อน
            qrElement.innerHTML = ""; 

            // ถ้าแกะลิงก์ไม่สำเร็จ ให้แจ้งเตือนและหยุดทำงานอย่างปลอดภัย
            if (!videoId) {
                alert('กรุณากรอกลิงก์ YouTube หรือ Shorts ที่ถูกต้องครับ');
                return;
            }

            // แยกและประกอบ URL ปลายทางสำหรับแชร์ตัวใหม่
            const cleanUrl = window.location.href.split('?')[0];
            const scanUrl = cleanUrl + "?v=" + videoId;

            // สั่งทำงานเครื่องมือสร้าง QR Code
            new QRCode(qrElement, {
                text: scanUrl,
                width: 210,
                height: 210,
                colorDark : "#000000",
                colorLight : "#ffffff",
                correctLevel : QRCode.CorrectLevel.H
            });
        }

        // ส่วนตรวจสอบเมื่อเปิดลิงก์: หากสแกนเข้ามาผ่านโทรศัพท์มือถือ
        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            const videoId = urlParams.get('v');

            if (videoId) {
                // เปลี่ยนหน้าแอปสลับไปหน้าเล่นวิดีโอทันที
                document.getElementById('generatorView').style.display = 'none';
                document.getElementById('playerView').style.display = 'block';
                
                // ตั้งค่าฝังเครื่องเล่นแบบดึงเฉพาะตัววิดีโอเพียวๆ มาแสดง พร้อมปิดวิดีโอแนะนำท้ายคลิป
                document.getElementById('ytPlayer').src = "https://youtube.com" + videoId + "?autoplay=1&modestbranding=1&rel=0&controls=1";
            }
        }
    </script>
</body>
</html>
