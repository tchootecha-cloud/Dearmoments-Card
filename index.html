<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>YouTube QR Code Generator</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Segoe UI,Tahoma,sans-serif;
    background:#f4f6f9;
    min-height:100vh;
}

.generator-container{
    max-width:500px;
    width:95%;
    margin:40px auto;
    background:#fff;
    padding:25px;
    border-radius:15px;
    box-shadow:0 5px 20px rgba(0,0,0,.12);
    text-align:center;
}

h1{
    color:#ff0000;
    margin-bottom:10px;
}

.subtitle{
    color:#666;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:14px;
    border:1px solid #ddd;
    border-radius:8px;
    font-size:15px;
    margin-bottom:15px;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
    font-weight:bold;
    transition:.2s;
}

.generate-btn{
    background:#ff0000;
    color:#fff;
}

.generate-btn:hover{
    background:#d40000;
}

.download-btn{
    background:#28a745;
    color:#fff;
    margin-top:15px;
    display:none;
}

.download-btn:hover{
    background:#218838;
}

#qrcode{
    margin-top:25px;
    display:flex;
    justify-content:center;
}

#qrcode img,
#qrcode canvas{
    padding:10px;
    background:#fff;
    border:1px solid #eee;
    border-radius:10px;
}

.player-container{
    display:none;
    width:100vw;
    height:100vh;
    background:#000;
}

.player-container iframe{
    width:100%;
    height:100%;
    border:none;
}

.status{
    margin-top:15px;
    color:#666;
    font-size:14px;
}

</style>
</head>

<body>

<div id="generatorView">

    <div class="generator-container">

        <h1>🎥 YouTube QR Generator</h1>

        <p class="subtitle">
            รองรับ YouTube Video และ Shorts
        </p>

        <input
            type="text"
            id="youtubeLink"
            placeholder="วางลิงก์ YouTube หรือ Shorts">

        <button
            class="generate-btn"
            onclick="generateQR()">

            สร้าง QR Code

        </button>

        <div id="qrcode"></div>

        <button
            id="downloadBtn"
            class="download-btn"
            onclick="downloadQR()">

            ดาวน์โหลด QR Code

        </button>

        <div id="status" class="status"></div>

    </div>

</div>

<div id="playerView" class="player-container">

    <iframe
        id="ytPlayer"
        allow="autoplay; encrypted-media"
        allowfullscreen>
    </iframe>

</div>

<script>

function extractYoutubeId(url){

    const patterns = [

        /(?:youtube\.com\/watch\?v=)([a-zA-Z0-9_-]{11})/,

        /(?:youtube\.com\/shorts\/)([a-zA-Z0-9_-]{11})/,

        /(?:youtu\.be\/)([a-zA-Z0-9_-]{11})/,

        /(?:youtube\.com\/embed\/)([a-zA-Z0-9_-]{11})/

    ];

    for(const pattern of patterns){

        const match = url.match(pattern);

        if(match){
            return match[1];
        }
    }

    return null;
}

function generateQR(){

    const input =
        document.getElementById(
            "youtubeLink"
        ).value.trim();

    const videoId =
        extractYoutubeId(input);

    const qrDiv =
        document.getElementById(
            "qrcode"
        );

    const status =
        document.getElementById(
            "status"
        );

    qrDiv.innerHTML = "";

    document
        .getElementById(
            "downloadBtn"
        ).style.display =
        "none";

    if(!videoId){

        status.innerHTML =
            "❌ ลิงก์ YouTube ไม่ถูกต้อง";

        return;
    }

    const baseUrl =
        window.location.origin +
        window.location.pathname;

    const qrUrl =
        baseUrl +
        "?v=" +
        videoId;

    new QRCode(qrDiv,{

        text: qrUrl,

        width:250,

        height:250,

        colorDark:"#000000",

        colorLight:"#ffffff",

        correctLevel:
        QRCode.CorrectLevel.H

    });

    status.innerHTML =
        "✅ สร้าง QR Code สำเร็จ";

    setTimeout(()=>{

        document
            .getElementById(
                "downloadBtn"
            ).style.display =
            "block";

    },300);
}

function downloadQR(){

    const canvas =
        document.querySelector(
            "#qrcode canvas"
        );

    if(canvas){

        const link =
            document.createElement(
                "a"
            );

        link.download =
            "youtube-qrcode.png";

        link.href =
            canvas.toDataURL(
                "image/png"
            );

        link.click();

        return;
    }

    const img =
        document.querySelector(
            "#qrcode img"
        );

    if(img){

        const link =
            document.createElement(
                "a"
            );

        link.download =
            "youtube-qrcode.png";

        link.href =
            img.src;

        link.click();
    }
}

window.onload = function(){

    const params =
        new URLSearchParams(
            window.location.search
        );

    const videoId =
        params.get("v");

    if(videoId){

        document
            .getElementById(
                "generatorView"
            ).style.display =
            "none";

        document
            .getElementById(
                "playerView"
            ).style.display =
            "block";

        document
            .getElementById(
                "ytPlayer"
            ).src =
            "https://www.youtube.com/embed/" +
            videoId +
            "?autoplay=1&rel=0&modestbranding=1&playsinline=1";
    }
}

</script>

</body>
</html>
